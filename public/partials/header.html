<script>
  (function() {
    const accessToken = localStorage.getItem("accessToken");
    const authSection = document.getElementById("nav-auth-section");
    
    if (accessToken && authSection) {
      authSection.innerHTML = `
        <a
          href="Resume.html"
          class="text-xs md:text-sm font-bold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100/80 px-4 py-2.5 rounded-xl transition duration-300 flex items-center gap-1.5"
        >
          <span>Workstation</span> 🚀
        </a>
        <button
          onclick="handleLogout()"
          class="text-xs md:text-sm font-semibold text-slate-500 hover:text-red-600 transition duration-300"
        >
          Sign Out
        </button>
      `;
    }
  })();

  function handleLogout() {
    localStorage.removeItem("accessToken");
    localStorage.removeItem("refreshToken");
    localStorage.removeItem("user");
    window.location.href = "index.html";
  }
</script>
